name: gitleaks-remediation

on:
  workflow_run:
    workflows: ["gitleaks"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  open-triage-issue:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create incident issue when leak is detected
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const run = context.payload.workflow_run || null;
            const runUrl = run ? run.html_url : `${context.serverUrl}/${owner}/${repo}/actions`;
            const runNumber = run ? run.run_number : 'manual';
            const marker = run ? `Run ID: ${run.id}` : 'Run ID: manual-dispatch';

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            if (existing.some(i => (i.body || '').includes(marker))) {
              core.info('Triage issue already exists for this run.');
              return;
            }

            const title = `[SECURITY] Secret leak triage (run #${runNumber})`;
            const body = [
              'Gitleaks a detecte un secret potentiel. Suivre le playbook sans exposer la valeur du secret.',
              '',
              marker,
              `Repository: ${owner}/${repo}`,
              `Workflow run: ${runUrl}`,
              '',
              'Checklist:',
              '- [ ] Revoquer le secret expose',
              '- [ ] Regenerer et redistribuer un nouveau secret',
              '- [ ] Purger l historique Git si necessaire',
              '- [ ] Relancer gitleaks et verifier le resultat',
              '- [ ] Documenter la cause racine et les actions preventives',
              '',
              'Reference: .github/SECRET_LEAK_PLAYBOOK.md'
            ].join('\n');

            try {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
              core.info('Incident issue created.');
            } catch (error) {
              core.warning(`Unable to create incident issue: ${error.message}`);
            }
